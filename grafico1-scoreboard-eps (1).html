<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>S&P 500 Q1 2026 — Scoreboard EPS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: #FAFAF8;
      color: #1a1a18;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
    }
    .card {
      background: #fff;
      border: 0.5px solid #dddbd3;
      border-radius: 12px;
      padding: 2rem 2.25rem 1.5rem;
      max-width: 560px;
      width: 100%;
    }
    .kicker {
      font-size: 10px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #888780;
      margin-bottom: 6px;
      font-family: 'DM Mono', monospace;
    }
    .title {
      font-size: 16px;
      font-weight: 500;
      color: #1a1a18;
      margin-bottom: 2rem;
      line-height: 1.4;
    }
    .bars {
      display: flex;
      align-items: flex-end;
      gap: 20px;
      height: 180px;
      margin-bottom: 1rem;
    }
    .bar-group {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      height: 100%;
      justify-content: flex-end;
    }
    .bar-value {
      font-family: 'DM Mono', monospace;
      font-size: 20px;
      font-weight: 500;
      margin-bottom: 8px;
    }
    .bar-fill {
      width: 100%;
      border-radius: 4px 4px 0 0;
      transition: opacity 0.2s;
    }
    .bar-fill:hover { opacity: 0.85; }
    .bar-label {
      font-size: 11px;
      color: #888780;
      margin-top: 8px;
      text-align: center;
      line-height: 1.4;
    }
    .baseline {
      border-top: 0.5px solid #dddbd3;
      margin-bottom: 1rem;
    }
    .delta {
      display: inline-block;
      background: #E6F1FB;
      color: #185FA5;
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      font-weight: 500;
      padding: 3px 8px;
      border-radius: 4px;
      margin-bottom: 1rem;
    }
    .source {
      font-size: 11px;
      color: #aaa89e;
      border-top: 0.5px solid #e8e6de;
      padding-top: 10px;
      margin-top: 1.5rem;
    }
  </style>
</head>
<body>
  <div class="card">
    <p class="kicker">Gráfico 1 — Scoreboard de la temporada</p>
    <p class="title">Empresas del S&amp;P 500 que superaron estimaciones de EPS</p>

    <div class="bars">
      <div class="bar-group">
        <div class="bar-value" style="color:#185FA5;">84%</div>
        <div class="bar-fill" style="background:#185FA5; height:160px;"></div>
        <div class="bar-label">Q1 2026</div>
      </div>
      <div class="bar-group">
        <div class="bar-value" style="color:#378ADD;">78%</div>
        <div class="bar-fill" style="background:#85B7EB; height:118px;"></div>
        <div class="bar-label">Promedio<br>5 años</div>
      </div>
      <div class="bar-group">
        <div class="bar-value" style="color:#378ADD;">76%</div>
        <div class="bar-fill" style="background:#B5D4F4; height:104px;"></div>
        <div class="bar-label">Promedio<br>10 años</div>
      </div>
    </div>

    <div class="baseline"></div>
    <span class="delta">+6 pp por encima del promedio histórico</span>

    <p class="source">Fuente: FactSet Earnings Insight, 21 de mayo de 2026</p>
  </div>
</body>
</html>
