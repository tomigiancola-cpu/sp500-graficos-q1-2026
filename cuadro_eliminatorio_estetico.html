<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flag-icons@7/css/flag-icons.min.css">
<style>

  html, body { height: 100%; margin: 0; overflow: hidden; }
  body {
    background: #0c1a2e;

    display: flex;
    align-items: center;
    justify-content: center;
    padding: 18px;
  }
  .panel {
    background: #0f2238;
    border: 1px solid #1f3a57;
    border-radius: 14px;
    padding: 18px 26px 16px;
    width: 1100px;
  }
  .kicker {
    font-size: 11px;

    color: #f5f1e6;

  .legend {
    display: flex;
    gap: 18px;
    flex-wrap: wrap;
    margin-bottom: 10px;
    font-size: 11px;
    color: #b9c4d4;
  }
  .legend span { display: flex; align-items: center; gap: 5px; }
  #bracket { position: relative; width: 1038px; height: 480px; margin: 0 auto; }
  .footer { border-top: 1px solid #1f3a57; margin-top: 10px; padding-top: 8px; display: flex; justify-content: space-between; align-items: center; }
  .footer p { font-size: 10.5px; color: #6f8099; margin: 0; }
  .fi { box-shadow: 0 0 0 0.5px rgba(255,255,255,0.18); border-radius: 2px; }

</head>

  };
  return '<svg width="' + size + '" height="' + size + '" viewBox="0 0 24 24">' + paths[type] + '</svg>';
}

const el = document.getElementById('bracket');

geo.segs.forEach(s => {
  const line = document.createElement('div');
  line.style.cssText = `position:absolute;left:${s.left}px;top:${s.top}px;width:${s.w}px;height:${s.h}px;background:#2b4a63`;
  el.appendChild(line);
});

function flagSpan(cc) {
  return `<span class="fi fi-${cc}" style="border-radius:2px;flex-shrink:0;width:16px;height:12px"></span>`;
}

function renderR32(data, boxes) {
  data.forEach((m,i) => {
    const b = boxes[i];
    const s = statusMap[m.status];
    const card = document.createElement('div');
    card.style.cssText = `position:absolute;left:${b.x}px;top:${b.y-b.h/2}px;width:${b.w}px;height:${b.h}px;background:${s.bg};border:1px solid ${s.border};border-radius:6px;display:flex;flex-direction:column;justify-content:center;padding:0 7px;gap:2px`;
    card.innerHTML = `
      <div style="display:flex;align-items:center;gap:5px;font-size:10.5px;color:#e8ecf2">${flagSpan(m.cc)}<span style="flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${m.a}</span></div>

  const card = document.createElement('div');
  card.style.cssText = `position:absolute;left:${b.x}px;top:${b.y-b.h/2}px;width:${b.w}px;height:${b.h}px;background:#142639;border:1px solid #233f5c;border-radius:6px;display:flex;align-items:center;justify-content:center;padding:0 6px`;

    card.innerHTML = `<div style="display:flex;align-items:center;gap:5px;font-size:10.5px;color:#e8ecf2">${flagSpan(filled[1])}<span>${filled[0]}</span></div>`;

  el.appendChild(card);
